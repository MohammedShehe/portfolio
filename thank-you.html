<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Mohammed Aminu Shehe</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .container {
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00d4ff, #6c2bd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #b0b0c8;
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, #6c2bd9, #4a1a9e);
            color: white;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108, 43, 217, 0.4);
        }
        .checkmark {
            font-size: 4rem;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully.<br>I'll get back to you as soon as possible.</p>
        <a href="/" class="btn">← Back to Home</a>
    </div>
</body>
</html>
